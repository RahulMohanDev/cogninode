<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>cogninode — sign in</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,500;12..96,600;12..96,700&family=Geist:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="app.css" />
<script>
  (function () {
    try {
      var saved = localStorage.getItem('cogninode_theme');
      if ((saved || 'dark') === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
    } catch (e) {}
  })();
</script>
<style>
  body { overflow: auto; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="shared.jsx"></script>
<script type="text/babel">
const { BigTree, Glyph, ThemeToggle } = window;

const Login = () => {
  const [mode, setMode] = React.useState("signin"); // signin | signup
  const [email, setEmail] = React.useState("");
  const [password, setPassword] = React.useState("");

  const onSubmit = (e) => {
    e.preventDefault();
    // Stub auth — proceed to chats page
    window.location.href = "chats.html";
  };

  return (
    <div className="auth-page">
      <ThemeToggle/>
      <div className="auth-side">
        <a href="../cogninode.html" className="auth-brand">
          <Glyph size={22}/>
          cogninode
        </a>

        <div className="auth-quote">
          Think with AI,<br/>
          <em>not</em> at it.
        </div>
        <p className="auth-byline">
          A chat that branches like your thoughts do. Reflect anything into a note.
          Pay only for the tokens you actually use.
        </p>

        <div style={{ color: "var(--ink-3)" }} className="auth-tree">
          <BigTree size={520}/>
        </div>
      </div>

      <div className="auth-form">
        <div className="auth-wrap">
          <h1>{mode === "signin" ? <>Welcome <em>back</em>.</> : <>Start <em>thinking</em>.</>}</h1>
          <p className="lead">
            {mode === "signin"
              ? "Sign in to pick up where any branch left off."
              : "Create an account — you'll get 400 free credits. That's more than four months of the free plan."}
          </p>

          <button className="btn-google" type="button" onClick={onSubmit}>
            <svg width="16" height="16" viewBox="0 0 24 24">
              <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
              <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
              <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
              <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
          </button>

          <div className="divider">or</div>

          <form onSubmit={onSubmit}>
            <div className="field">
              <label>Email</label>
              <input
                type="email"
                placeholder="you@thinking.org"
                value={email}
                onChange={(e) => setEmail(e.target.value)}
                required
              />
            </div>
            <div className="field">
              <label>Password</label>
              <input
                type="password"
                placeholder="••••••••"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                required
                minLength="6"
              />
            </div>
            <button className="btn-primary coral" type="submit">
              {mode === "signin" ? "Sign in" : "Create account"}
              <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
                <path d="M3 8 H13 M9 4 L13 8 L9 12" stroke="currentColor" strokeWidth="1.6" strokeLinecap="round" strokeLinejoin="round"/>
              </svg>
            </button>
          </form>

          <div className="tos">
            By {mode === "signin" ? "signing in" : "creating an account"} you agree to our{" "}
            <a href="#">Terms</a> and <a href="#">Privacy Policy</a>.
          </div>

          <div className="foot-link">
            {mode === "signin" ? (
              <>New here? <a href="#" onClick={(e) => { e.preventDefault(); setMode("signup"); }}>Create an account</a></>
            ) : (
              <>Already a member? <a href="#" onClick={(e) => { e.preventDefault(); setMode("signin"); }}>Sign in</a></>
            )}
          </div>
        </div>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<Login/>);
</script>
</body>
</html>
